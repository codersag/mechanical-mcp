name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff black
      - name: Ruff
        run: ruff check mechanical_mcp_server.py
      - name: Black
        run: black --check --target-version py310 mechanical_mcp_server.py
